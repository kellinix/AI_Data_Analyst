# ============================================================
# AI Dashboard Generator — Docker Compose (Production)
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

networks:
  ai_dashboard_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  nginx_certs:
    driver: local

services:
  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ai_dashboard_postgres
    restart: always
    networks:
      - ai_dashboard_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports exposed in production — internal network only
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai_dashboard_redis
    restart: always
    networks:
      - ai_dashboard_network
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.prod.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ----------------------------------------------------------
  # FastAPI Backend
  # ----------------------------------------------------------
  backend:
    image: ${DOCKER_REGISTRY}/ai-dashboard-backend:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: production
    container_name: ai_dashboard_backend
    restart: always
    networks:
      - ai_dashboard_network
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --keepalive 5
      --access-logfile -
      --error-logfile -
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ----------------------------------------------------------
  # Celery Worker
  # ----------------------------------------------------------
  celery_worker:
    image: ${DOCKER_REGISTRY}/ai-dashboard-backend:${DOCKER_IMAGE_TAG:-latest}
    restart: always
    networks:
      - ai_dashboard_network
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=8 --queues=analysis,default,celery
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ----------------------------------------------------------
  # Celery Beat
  # ----------------------------------------------------------
  celery_beat:
    image: ${DOCKER_REGISTRY}/ai-dashboard-backend:${DOCKER_IMAGE_TAG:-latest}
    restart: always
    networks:
      - ai_dashboard_network
    env_file:
      - .env
    environment:
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=warning
    deploy:
      replicas: 1

  # ----------------------------------------------------------
  # Next.js Frontend
  # ----------------------------------------------------------
  frontend:
    image: ${DOCKER_REGISTRY}/ai-dashboard-frontend:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: production
    container_name: ai_dashboard_frontend
    restart: always
    networks:
      - ai_dashboard_network
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ----------------------------------------------------------
  # Nginx Reverse Proxy
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: ai_dashboard_nginx
    restart: always
    networks:
      - ai_dashboard_network
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
