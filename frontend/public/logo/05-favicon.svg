<svg width="280" height="180" viewBox="0 0 280 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>InsightFlow – Favicon</title>
  <desc>InsightFlow favicon at 32x32 and 16x16</desc>
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>

  <!-- 32×32 favicon -->
  <rect x="64" y="32" width="84" height="84" rx="16" fill="#0F172A"/>
  <g transform="translate(84, 50)">
    <rect x="0" y="20" width="10" height="20" rx="2" fill="#14B8A6"/>
    <rect x="15" y="10" width="10" height="30" rx="2" fill="#2563EB"/>
    <rect x="30" y="0" width="10" height="40" rx="2" fill="#FFFFFF"/>
    <path d="M5 18 Q20 -5 35 -0.5" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="35" cy="-0.5" r="2.5" fill="#14B8A6"/>
  </g>

  <!-- 16×16 favicon -->
  <rect x="186" y="52" width="42" height="42" rx="8" fill="#0F172A"/>
  <g transform="translate(195, 63)">
    <rect x="0" y="10" width="5" height="10" rx="1" fill="#14B8A6"/>
    <rect x="8" y="5" width="5" height="15" rx="1" fill="#2563EB"/>
    <rect x="16" y="0" width="5" height="20" rx="1" fill="#FFFFFF"/>
    <circle cx="18" cy="-0.5" r="1.5" fill="#14B8A6"/>
  </g>

  <!-- Labels -->
  <text x="106" y="140" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="0.08em" font-weight="500">32×32</text>
  <text x="207" y="140" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="0.08em" font-weight="500">16×16</text>
</svg>
