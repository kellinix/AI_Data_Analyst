<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>InsightFlow – Full Logo (Light)</title>
  <desc>InsightFlow full logo on white background</desc>
  <rect width="480" height="120" rx="12" fill="#FFFFFF"/>

  <!-- Icon mark -->
  <g transform="translate(40, 22)">
    <!-- Bar 1 – teal, shortest -->
    <rect x="0" y="28" width="14" height="28" rx="3" fill="#14B8A6"/>
    <!-- Bar 2 – blue, medium -->
    <rect x="22" y="14" width="14" height="42" rx="3" fill="#2563EB"/>
    <!-- Bar 3 – dark, tallest -->
    <rect x="44" y="0" width="14" height="56" rx="3" fill="#0F172A"/>
    <!-- Arc -->
    <path d="M7 26 Q28 -8 51 -2" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <!-- Dot -->
    <circle cx="51" cy="-2" r="3.5" fill="#14B8A6"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="58" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-weight="600" font-size="36" letter-spacing="-1" fill="#0F172A">Insight<tspan fill="#2563EB">Flow</tspan></text>
  <!-- Tagline -->
  <text x="121" y="82" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-weight="400" font-size="13" fill="#64748B" letter-spacing="0.1">Business intelligence, beautifully clear</text>
</svg>
