<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>InsightFlow – Icon Only</title>
  <desc>InsightFlow icon mark at 64px and 32px sizes</desc>
  <rect width="320" height="200" rx="12" fill="#F8FAFC"/>

  <!-- 64px icon -->
  <g transform="translate(72, 44)">
    <rect x="0" y="42" width="20" height="40" rx="4" fill="#14B8A6"/>
    <rect x="30" y="21" width="20" height="61" rx="4" fill="#2563EB"/>
    <rect x="60" y="0" width="20" height="82" rx="4" fill="#0F172A"/>
    <path d="M10 39 Q40 -10 70 -2" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <circle cx="70" cy="-2" r="5" fill="#14B8A6"/>
  </g>

  <!-- 32px icon -->
  <g transform="translate(210, 62)">
    <rect x="0" y="18" width="9" height="18" rx="2" fill="#14B8A6"/>
    <rect x="13" y="9" width="9" height="27" rx="2" fill="#2563EB"/>
    <rect x="26" y="0" width="9" height="36" rx="2" fill="#0F172A"/>
    <path d="M4.5 17 Q18 -5 30.5 -1" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <circle cx="30.5" cy="-1" r="2.5" fill="#14B8A6"/>
  </g>

  <!-- Labels -->
  <text x="112" y="168" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="0.08em" font-weight="500">64px</text>
  <text x="225" y="168" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" letter-spacing="0.08em" font-weight="500">32px</text>
</svg>
