<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>InsightFlow – Monochrome</title>
  <desc>InsightFlow full logo in single-color monochrome</desc>
  <rect width="480" height="120" rx="12" fill="#FAFAFA"/>

  <!-- Monochrome icon -->
  <g transform="translate(40, 22)">
    <rect x="0" y="28" width="14" height="28" rx="3" fill="#0F172A" opacity="0.45"/>
    <rect x="22" y="14" width="14" height="42" rx="3" fill="#0F172A" opacity="0.7"/>
    <rect x="44" y="0" width="14" height="56" rx="3" fill="#0F172A"/>
    <path d="M7 26 Q28 -8 51 -2" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
    <circle cx="51" cy="-2" r="3.5" fill="#0F172A" opacity="0.55"/>
  </g>

