# ============================================================
# AI Dashboard Generator — Docker Compose (Development)
# ============================================================

networks:
  ai_dashboard_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

services:
  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ai_dashboard_postgres
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-ai_dashboard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_dashboard_user} -d ${POSTGRES_DB:-ai_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Redis (Cache + Celery Broker)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai_dashboard_redis
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FastAPI Backend
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    container_name: ai_dashboard_backend
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_dashboard_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_dashboard}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-ai_dashboard_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_dashboard}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------------------------
  # Celery Worker (Analysis Jobs)
  # ----------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    container_name: ai_dashboard_celery_worker
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_dashboard_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_dashboard}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-ai_dashboard_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_dashboard}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 --queues=analysis,default,celery

  # ----------------------------------------------------------
  # Celery Beat (Scheduled Tasks)
  # ----------------------------------------------------------
  celery_beat:
    profiles:
      - scheduler
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    container_name: ai_dashboard_celery_beat
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_dashboard_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_dashboard}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-ai_dashboard_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_dashboard}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ----------------------------------------------------------
  # Next.js Frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    container_name: ai_dashboard_frontend
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

  # ----------------------------------------------------------
  # Flower (Celery Monitoring) — Dev only
  # ----------------------------------------------------------
  flower:
    profiles:
      - tools
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    container_name: ai_dashboard_flower
    restart: unless-stopped
    networks:
      - ai_dashboard_network
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=admin:devpassword
