name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    env:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        if: env.REGISTRY_URL != '' && env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != ''
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_URL}" -u "${REGISTRY_USERNAME}" --password-stdin
          docker build -f docker/backend.Dockerfile --target production -t "${REGISTRY_URL}/ai-dashboard-backend:${{ github.sha }}" .
          docker push "${REGISTRY_URL}/ai-dashboard-backend:${{ github.sha }}"

      - name: Deploy to Railway/Render
        if: env.REGISTRY_URL != '' && env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' && env.DEPLOY_TOKEN != '' && env.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"image":"'"${REGISTRY_URL}"'/ai-dashboard-backend:${{ github.sha }}"}' \
            "${DEPLOY_WEBHOOK_URL}"

      - name: Skip backend deploy
        if: env.REGISTRY_URL == '' || env.REGISTRY_USERNAME == '' || env.REGISTRY_PASSWORD == '' || env.DEPLOY_TOKEN == '' || env.DEPLOY_WEBHOOK_URL == ''
        run: |
          echo "Backend deploy skipped because one or more production deployment secrets are not configured."

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"

      - name: Skip frontend deploy
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: |
          echo "Frontend deploy skipped because one or more Vercel production secrets are not configured."
